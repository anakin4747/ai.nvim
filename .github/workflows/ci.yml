name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  check-approval:
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Check for ci-approved label
        id: check
        run: |
          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q '"ci-approved"'; then
            echo "approved=true" >> $GITHUB_OUTPUT
          else
            echo "approved=false" >> $GITHUB_OUTPUT
            echo "::notice::Add the 'ci-approved' label to this PR to run CI."
          fi

  test:
    needs: check-approval
    if: needs.check-approval.outputs.approved == 'true'
    runs-on: ubuntu-latest
    environment: ci-approval

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Run offline tests
        run: OFFLINE_ONLY=1 make
